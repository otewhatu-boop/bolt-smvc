<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Monitor Centre</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f5f5; }
        .container { max-width: 420px; margin: 5rem auto; background: white; padding: 2rem; border-radius:8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);} 
        label{ display:block; margin-bottom: .5rem; }
        input{ width:100%; padding:.5rem; margin-bottom:1rem; }
        button{ background:#3498db; color:#fff; padding:.6rem 1rem; border:none; border-radius:4px; cursor:pointer; }
        .error{ color: #c0392b; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Login</h2>
        <div th:if="${param.error}" class="error">Invalid username or password.</div>
        <form th:action="@{/login}" method="post">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" required />

            <label for="password">Password</label>
            <input id="password" name="password" type="password" required />

            <button type="submit">Sign in</button>
        </form>
    </div>
</body>
</html>
