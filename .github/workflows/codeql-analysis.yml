name: "CodeQL"

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  schedule:
    - cron: '0 2 * * 0'

permissions:
  contents: read
  actions: read
  security-events: write
  checks: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          languages: java
          build-mode: none

      - name: Build with Maven
        run: mvn clean package

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "security"

      - name: Test Report
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: JUnit Tests
          path: target/junit-reports/*.xml
          reporter: java-junit
          list-tests: failed

      - name: Jacoco Report to Summary
        id: jacoco
        uses: madrapps/jacoco-report@v1.8.0
        if: success() || failure()
        with:
          paths: target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          title: Code Coverage Summary
          update-comment: true
          comment-type: summary

      - name: Prominent Coverage Summary
        if: success() || failure()
        run: |
          echo "## Overall Code Coverage: ${{ steps.jacoco.outputs.coverage-overall }}%" >> $GITHUB_STEP_SUMMARY

      - name: Fail if coverage is below 80%
        if: (success() || failure()) && steps.jacoco.outputs.coverage-overall < 80
        uses: actions/github-script@v9
        with:
          script: |
            core.setFailed('Overall code coverage is ${{ steps.jacoco.outputs.coverage-overall }}%, which is below the 80% gate.')


  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        if: success() || failure()
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: success() || failure()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

      - name: Run Grype vulnerability scanner
        id: grype-scan
        uses: anchore/scan-action@v7
        if: success() || failure()
        continue-on-error: true
        with:
          path: "."
          output-format: sarif
          output-file: 'grype-results.sarif'
          severity-cutoff: high

      - name: Upload Grype scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: (success() || failure()) && steps.grype-scan.outcome == 'success'
        with:
          sarif_file: 'grype-results.sarif'
          category: 'grype'

      - name: Security Summary
        if: success() || failure()
        run: |
          echo "### Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f trivy-results.sarif ]; then
            TRIVY_COUNT=$(jq '[.runs[].results[]] | length' trivy-results.sarif)
            echo "- **Trivy Findings:** $TRIVY_COUNT" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Trivy Findings:** N/A" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f grype-results.sarif ]; then
            GRYPE_COUNT=$(jq '[.runs[].results[]] | length' grype-results.sarif)
            echo "- **Grype Findings:** $GRYPE_COUNT" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Grype Findings:** N/A" >> $GITHUB_STEP_SUMMARY
          fi

  conclusion:
    name: Conclusion
    needs: [analyze, security]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Workflow Conclusion
        uses: actions/github-script@v9
        with:
          script: |
            const analyzeStatus = "${{ needs.analyze.result }}";
            const securityStatus = "${{ needs.security.result }}";

            const results = [
              { job: "Analyze", status: analyzeStatus },
              { job: "Security", status: securityStatus }
            ];

            let summary = "## Workflow Results Summary\n\n";
            summary += "| Job | Status |\n";
            summary += "| --- | --- |\n";

            results.forEach(res => {
              const icon = res.status === 'success' ? '✅' : (res.status === 'failure' ? '❌' : '⚠️');
              summary += `| ${res.job} | ${icon} ${res.status} |\n`;
            });

            await core.summary.addRaw(summary).write();

            if (analyzeStatus !== 'success' || securityStatus !== 'success') {
              core.setFailed('One or more jobs in the workflow failed.');
            }
